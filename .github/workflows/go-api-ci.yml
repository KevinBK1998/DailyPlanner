name: Go API CI

on:
  push:
    paths:
      - 'go-api/**'
      - '.github/workflows/go-api-ci.yml'
  pull_request:
    paths:
      - 'go-api/**'
      - '.github/workflows/go-api-ci.yml'

jobs:
  go-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-api/go.mod

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
