name: Go API Release

on:
  push:
    tags:
      - 'go-api-v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    defaults:
      run:
        working-directory: go-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-api/go.mod

      - name: Test
        run: go test ./...

      - name: Build Linux binary
        if: runner.os == 'Linux'
        run: go build -o daily_planner_go_api-linux-x86_64 ./cmd/main.go

      - name: Build Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: go build -o daily_planner_go_api-windows-x86_64.exe ./cmd/main.go

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: daily_planner_go_api-linux-x86_64
          path: go-api/daily_planner_go_api-linux-x86_64

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: daily_planner_go_api-windows-x86_64.exe
          path: go-api/daily_planner_go_api-windows-x86_64.exe

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Go API ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/daily_planner_go_api-linux-x86_64/daily_planner_go_api-linux-x86_64
            dist/daily_planner_go_api-windows-x86_64.exe/daily_planner_go_api-windows-x86_64.exe
