<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Planner</title>
</head>

<body>
    <main>
        <h1>Daily Planner</h1>
        <p>Plan clearly. Finish confidently.</p>
        <section>
            <h2>Add a task</h2>
            <form>
                <label for="task-title">Task title</label>
                <input id="task-title" name="taskTitle" type="text" required />
                <button type="submit">Add Task</button>
            </form>
        </section>
        <section>
            <h2>Today's tasks</h2>
            <ul>
                <li>Finish HTML structure</li>
                <li>Set up GO API tests</li>
                <li>Write CSS layout</li>
            </ul>
        </section>
    </main>
</body>

</html>
